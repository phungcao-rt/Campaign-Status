<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partner Campaign Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --border: #252a35;
    --text: #e8eaf0;
    --muted: #6b7280;
    --ongoing: #22c55e;
    --ongoing-bg: #052e16;
    --stopped: #f97316;
    --stopped-bg: #1c0a00;
    --banned: #ef4444;
    --banned-bg: #1c0000;
    --mixed: #eab308;
    --mixed-bg: #1a1400;
    --integrated: #60a5fa;
    --integrated-bg: #0a1628;
    --accent: #a78bfa;
    --accent2: #38bdf8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }

  /* ── HEADER ── */
  .header {
    padding: 32px 32px 0;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #13151d 0%, var(--bg) 100%);
  }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; padding-bottom: 24px; }
  .title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  .title span { color: var(--accent); }
  .subtitle { font-size: 13px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }
  .stats { display: flex; gap: 24px; flex-wrap: wrap; }
  .stat { text-align: right; }
  .stat-val { font-size: 24px; font-weight: 700; color: var(--accent2); font-family: 'DM Mono', monospace; }
  .stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .last-updated { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 4px; }

  /* ── CONTROLS ── */
  .controls {
    display: flex; gap: 12px; align-items: center; padding: 16px 32px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border); background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  input[type=search] {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 8px 12px 8px 34px; font-family: 'DM Mono', monospace; font-size: 13px;
    outline: none; transition: border-color .2s;
  }
  input[type=search]:focus { border-color: var(--accent); }
  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-btn.f-ongoing.active  { background: var(--ongoing); border-color: var(--ongoing); }
  .filter-btn.f-stopped.active  { background: var(--stopped); border-color: var(--stopped); }
  .filter-btn.f-banned.active   { background: var(--banned);  border-color: var(--banned); }
  .filter-btn.f-mixed.active    { background: var(--mixed);   border-color: var(--mixed); color:#000; }
  .view-toggle { display: flex; gap: 4px; margin-left: auto; }
  .view-btn {
    padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; font-size: 13px; transition: all .15s;
  }
  .view-btn.active { background: var(--surface); color: var(--text); border-color: var(--accent); }

  /* ── MAIN ── */
  main { padding: 24px 32px; }

  /* ── PIVOT TABLE ── */
  .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
  table { border-collapse: collapse; width: 100%; font-size: 12px; }
  thead th {
    background: #1a1d27; color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .8px;
    padding: 10px 12px; border-bottom: 1px solid var(--border); white-space: nowrap;
    position: sticky; top: 0;
  }
  thead th.campaign-col { writing-mode: vertical-rl; transform: rotate(180deg); height: 120px; vertical-align: bottom; padding: 12px 8px; font-size: 9px; color: var(--text); }
  thead th.sticky-col { position: sticky; left: 0; z-index: 10; background: #1a1d27; }
  tr:hover td { background: #1e2130 !important; }
  td {
    padding: 8px 12px; border-bottom: 1px solid #1a1d24; white-space: nowrap;
    transition: background .1s;
  }
  td.sticky-col {
    position: sticky; left: 0; z-index: 5; background: var(--surface);
    font-weight: 600; font-size: 12px; border-right: 1px solid var(--border);
  }
  td.num-col { font-family: 'DM Mono', monospace; text-align: center; color: var(--muted); font-size: 11px; }
  td.status-col { text-align: center; }

  /* ── CELL BADGES ── */
  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 4px; padding: 2px 7px; font-size: 10px; font-weight: 600;
    font-family: 'DM Mono', monospace; letter-spacing: .3px;
  }
  .b-ongoing    { background: var(--ongoing-bg);    color: var(--ongoing);    border: 1px solid #14532d; }
  .b-stopped    { background: var(--stopped-bg);    color: var(--stopped);    border: 1px solid #7c2d12; }
  .b-banned     { background: var(--banned-bg);     color: var(--banned);     border: 1px solid #7f1d1d; }
  .b-mixed      { background: var(--mixed-bg);      color: var(--mixed);      border: 1px solid #713f12; }
  .b-integrated { background: var(--integrated-bg); color: var(--integrated); border: 1px solid #1e3a5f; }
  .b-dot { width: 20px; height: 20px; border-radius: 50%; margin: auto; }
  .b-dot.ongoing    { background: var(--ongoing); box-shadow: 0 0 6px var(--ongoing); }
  .b-dot.stopped    { background: var(--stopped); }
  .b-dot.banned     { background: var(--banned);  box-shadow: 0 0 6px var(--banned); }
  .b-dot.mixed      { background: var(--mixed);   }
  .b-dot.integrated { background: #1e3a5f; border: 1px solid var(--integrated); }
  .b-dot.empty      { background: #1a1d24; }

  /* ── CARD VIEW ── */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .card.ongoing::before   { background: var(--ongoing); }
  .card.stopped::before   { background: var(--stopped); }
  .card.banned::before    { background: var(--banned); }
  .card.mixed::before     { background: var(--mixed); }
  .card.integrated::before { background: var(--integrated); }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .card-name { font-size: 14px; font-weight: 700; line-height: 1.3; flex: 1; padding-right: 8px; }
  .card-campaigns { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
  .campaign-tag {
    font-size: 9px; font-family: 'DM Mono', monospace; padding: 2px 6px;
    border-radius: 4px; background: var(--bg); border: 1px solid var(--border); color: var(--muted);
    letter-spacing: .3px;
  }
  .card-stats { display: flex; gap: 12px; }
  .card-stat { text-align: center; }
  .card-stat-val { font-size: 18px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .card-stat-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }

  /* ── MODAL ── */
  .modal-bg {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 28px; max-width: 640px; width: 90%; max-height: 80vh; overflow-y: auto;
    position: relative;
  }
  .modal-close {
    position: absolute; top: 16px; right: 16px; background: none; border: none;
    color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px;
  }
  .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .modal-meta { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 20px; }
  .modal-campaign {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; margin-bottom: 8px;
  }
  .modal-campaign-name { font-size: 13px; font-weight: 700; margin-bottom: 6px; display: flex; justify-content: space-between; }
  .modal-campaign-detail { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; line-height: 1.8; }

  .count-row { display: flex; gap: 8px; }
  .count-chip { padding: 1px 8px; border-radius: 3px; font-size: 10px; font-weight: 600; }
  .chip-g { background: var(--ongoing-bg); color: var(--ongoing); }
  .chip-o { background: var(--stopped-bg); color: var(--stopped); }
  .chip-r { background: var(--banned-bg);  color: var(--banned); }
  .chip-b { background: var(--integrated-bg); color: var(--integrated); }

  .empty { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 14px; }
  .result-count { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 14px; }
  
  /* ── SETUP BANNER ── */
  .setup-banner {
    background: linear-gradient(135deg, #1a1228, #0f1a28);
    border: 1px solid #2d2040; border-radius: 12px; padding: 20px 24px;
    margin-bottom: 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .setup-banner .icon { font-size: 28px; }
  .setup-banner h3 { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .setup-banner p { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .setup-banner code {
    background: var(--bg); padding: 2px 6px; border-radius: 4px;
    font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent2);
  }

  @media (max-width: 640px) {
    .header, main { padding: 16px; }
    .controls { padding: 12px 16px; }
    .stats { gap: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="title">Partner <span>Campaign</span> Dashboard</div>
      <div class="subtitle">SP Team · 2025</div>
    </div>
    <div>
      <div class="stats" id="stats"></div>
      <div class="last-updated" id="lastUpdated"></div>
    </div>
  </div>
</div>

<div class="controls">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="searchInput" placeholder="Tìm partner...">
  </div>
  <div class="filter-group">
    <button class="filter-btn active" data-filter="all">Tất cả</button>
    <button class="filter-btn f-ongoing" data-filter="Ongoing">🟢 Ongoing</button>
    <button class="filter-btn f-mixed"   data-filter="Mixed">🟡 Mixed</button>
    <button class="filter-btn f-stopped" data-filter="Stopped">🟠 Stopped</button>
    <button class="filter-btn f-banned"  data-filter="Banned">🔴 Banned</button>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="btnTable" onclick="setView('table')">⊞ Pivot</button>
    <button class="view-btn" id="btnCard" onclick="setView('card')">▦ Cards</button>
  </div>
</div>

<main>
  <div class="setup-banner">
    <div class="icon">🔗</div>
    <div>
      <h3>Kết nối Google Sheets để tự động cập nhật</h3>
      <p>
        Dán URL Apps Script Web App vào đây:
        <input id="apiUrl" type="text" placeholder="https://script.google.com/macros/s/XXXXX/exec"
          style="background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 10px;font-family:'DM Mono',monospace;font-size:11px;width:380px;margin:0 8px;outline:none;">
        <button onclick="loadFromApi()" style="background:var(--accent);border:none;border-radius:6px;color:#fff;padding:5px 14px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;">Load</button>
        &nbsp;·&nbsp; Xem hướng dẫn setup <strong style="color:var(--accent2)">README.md</strong>
      </p>
    </div>
  </div>

  <div class="result-count" id="resultCount"></div>
  <div id="tableView" class="table-wrap"></div>
  <div id="cardView"  class="card-grid" style="display:none"></div>
</main>

<!-- Modal -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="document.getElementById('modalBg').classList.remove('open')">✕</button>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-meta"  id="modalMeta"></div>
    <div id="modalBody"></div>
  </div>
</div>

let currentData = RAW;
let currentFilter = 'all';
let currentSearch = '';
let currentView = 'table';

function statusClass(s) {
  return (s||'').toLowerCase().replace(' ','');
}

function badgeHtml(s) {
  const cls = statusClass(s);
  return `<span class="badge b-${cls}">${s}</span>`;
}

function dotHtml(s) {
  if (!s) return `<div class="b-dot empty"></div>`;
  return `<div class="b-dot ${statusClass(s)}"></div>`;
}

function renderStats(data) {
  const partners = data.partners;
  const total = partners.length;
  const ongoing = partners.filter(p=>p.status==='Ongoing').length;
  const mixed   = partners.filter(p=>p.status==='Mixed').length;
  const campaigns = data.campaigns.length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-val">${total}</div><div class="stat-lbl">Partners</div></div>
    <div class="stat"><div class="stat-val">${campaigns}</div><div class="stat-lbl">Campaigns</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--ongoing)">${ongoing}</div><div class="stat-lbl">Active</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--mixed)">${mixed}</div><div class="stat-lbl">Mixed</div></div>
  `;
  const d = new Date(data.lastUpdated);
  document.getElementById('lastUpdated').textContent = 'Updated: ' + d.toLocaleString('vi-VN');
}

function getFiltered() {
  return currentData.partners.filter(p => {
    const matchSearch = !currentSearch || p.partner.toLowerCase().includes(currentSearch.toLowerCase());
    const matchFilter = currentFilter === 'all' || p.status === currentFilter;
    return matchSearch && matchFilter;
  });
}

function renderTable(partners) {
  const campaigns = currentData.campaigns;
  // Short names
  const shortNames = campaigns.map(c => c.replace(/ \(Adjust\)| \(Airbridge\)| \(AF\)| \(CPI\)/g,'').trim());

  let html = `<table><thead><tr>
    <th class="sticky-col" style="min-width:180px">Partner</th>
    <th class="campaign-col" style="width:40px"># Campaigns</th>
    <th class="campaign-col" style="width:40px">Total PIDs</th>
    ${shortNames.map(n=>`<th class="campaign-col" style="width:36px">${n}</th>`).join('')}
    <th class="campaign-col" style="width:60px">Status</th>
  </tr></thead><tbody>`;

  for (const p of partners) {
    const campaignMap = {};
    for (const c of p.campaigns) campaignMap[c.name] = c.status;
    html += `<tr onclick="openModal('${p.partner}')">
      <td class="sticky-col">${p.partner}</td>
      <td class="num-col" style="color:var(--accent);font-weight:700">${p.numCampaigns}</td>
      <td class="num-col">${p.totalPIDs}</td>
      ${campaigns.map(c => `<td class="status-col">${dotHtml(campaignMap[c])}</td>`).join('')}
      <td class="status-col">${badgeHtml(p.status)}</td>
    </tr>`;
  }

  html += '</tbody></table>';
  document.getElementById('tableView').innerHTML = html;
}

function renderCards(partners) {
  const html = partners.map(p => {
    const tags = p.campaigns.map(c =>
      `<span class="campaign-tag">${c.name.replace(/ \(Adjust\)| \(Airbridge\)| \(AF\)| \(CPI\)/g,'').trim()}</span>`
    ).join('');
    const sc = statusClass(p.status);
    const color = {ongoing:'var(--ongoing)',mixed:'var(--mixed)',stopped:'var(--stopped)',banned:'var(--banned)',integrated:'var(--integrated)'}[sc]||'var(--muted)';
    return `<div class="card ${sc}" onclick="openModal('${p.partner}')">
      <div class="card-header">
        <div class="card-name">${p.partner}</div>
        ${badgeHtml(p.status)}
      </div>
      <div class="card-campaigns">${tags}</div>
      <div class="card-stats">
        <div class="card-stat"><div class="card-stat-val" style="color:var(--accent)">${p.numCampaigns}</div><div class="card-stat-lbl">Campaigns</div></div>
        <div class="card-stat"><div class="card-stat-val">${p.totalPIDs}</div><div class="card-stat-lbl">PIDs</div></div>
        <div class="card-stat"><div class="card-stat-val" style="color:var(--ongoing)">${p.ongoing}</div><div class="card-stat-lbl">Ongoing</div></div>
        <div class="card-stat"><div class="card-stat-val" style="color:var(--stopped)">${p.stopped}</div><div class="card-stat-lbl">Stopped</div></div>
        ${p.banned>0?`<div class="card-stat"><div class="card-stat-val" style="color:var(--banned)">${p.banned}</div><div class="card-stat-lbl">Banned</div></div>`:''}
      </div>
    </div>`;
  }).join('');
  document.getElementById('cardView').innerHTML = html || '<div class="empty">Không tìm thấy kết quả</div>';
}

function render() {
  const filtered = getFiltered();
  document.getElementById('resultCount').textContent = `${filtered.length} / ${currentData.partners.length} partners`;
  if (currentView === 'table') renderTable(filtered);
  else renderCards(filtered);
}

function setView(v) {
  currentView = v;
  document.getElementById('tableView').style.display = v==='table' ? '' : 'none';
  document.getElementById('cardView').style.display  = v==='card'  ? '' : 'none';
  document.getElementById('btnTable').classList.toggle('active', v==='table');
  document.getElementById('btnCard').classList.toggle('active',  v==='card');
  render();
}

function openModal(partnerName) {
  const p = currentData.partners.find(x=>x.partner===partnerName);
  if (!p) return;
  document.getElementById('modalTitle').textContent = p.partner;
  document.getElementById('modalMeta').innerHTML = `
    ${p.numCampaigns} campaigns &nbsp;·&nbsp; ${p.totalPIDs} PIDs total &nbsp;·&nbsp; ${badgeHtml(p.status)}
  `;
  const body = p.campaigns.map(c => {
    const dates = [
      c.pubShareDates    ? `📅 Pub share: ${c.pubShareDates}` : '',
      c.integrationDates ? `✅ Integration: ${c.integrationDates}` : '',
      c.pauseDates       ? `⏸ Pause: ${c.pauseDates}` : '',
    ].filter(Boolean).join('<br>');
    return `<div class="modal-campaign">
      <div class="modal-campaign-name">
        <span>${c.name}</span>
        ${badgeHtml(c.status)}
      </div>
      <div class="count-row" style="margin-bottom:6px">
        ${c.ongoing     ? `<span class="count-chip chip-g">Ongoing ${c.ongoing}</span>` : ''}
        ${c.stopped     ? `<span class="count-chip chip-o">Stopped ${c.stopped}</span>` : ''}
        ${c.banned      ? `<span class="count-chip chip-r">Banned ${c.banned}</span>`  : ''}
        ${c.launched    ? `<span class="count-chip chip-b">Launched ${c.launched}</span>` : ''}
        ${c.integrating ? `<span class="count-chip" style="background:#1a1400;color:#eab308">Integrating ${c.integrating}</span>` : ''}
      </div>
      ${dates ? `<div class="modal-campaign-detail">${dates}</div>` : ''}
    </div>`;
  }).join('');
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalBg').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalBg')) document.getElementById('modalBg').classList.remove('open');
}

const STORAGE_KEY = 'partner_dashboard_api_url';

function fetchFromUrl(url, onSuccess, onFail) {
  const callbackName = 'gscb_' + Date.now();
  const script = document.createElement('script');
  const timeout = setTimeout(() => {
    cleanup();
    onFail && onFail('Timeout');
  }, 15000);

  function cleanup() {
    clearTimeout(timeout);
    delete window[callbackName];
    if (script.parentNode) script.parentNode.removeChild(script);
  }

  window[callbackName] = function(data) {
    cleanup();
    onSuccess(data);
  };

  const separator = url.includes('?') ? '&' : '?';
  script.src = url + separator + 'callback=' + callbackName;
  script.onerror = () => {
    cleanup();
    // fallback fetch
    fetch(url)
      .then(r => r.json())
      .then(onSuccess)
      .catch(e => onFail && onFail(e.message));
  };
  document.head.appendChild(script);
}

function applyData(data) {
  currentData = data;
  renderStats(data);
  render();
  document.querySelector('.setup-banner').style.display = 'none';
}

function loadFromApi() {
  const url = document.getElementById('apiUrl').value.trim();
  if (!url) return alert('Vui lòng nhập URL Apps Script');

  // Lưu URL vào localStorage để tự động load lần sau
  localStorage.setItem(STORAGE_KEY, url);

  const btn = document.querySelector('.setup-banner button');
  btn.textContent = 'Đang load...';
  btn.disabled = true;

  fetchFromUrl(url,
    (data) => {
      applyData(data);
      btn.textContent = 'Load';
      btn.disabled = false;
    },
    (err) => {
      btn.textContent = 'Load';
      btn.disabled = false;
      alert('Lỗi: ' + err + '\nKiểm tra lại URL và đảm bảo Deploy với "Anyone".');
    }
  );
}

// Events
document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});
document.addEventListener('keydown', e => {
  if (e.key==='Escape') document.getElementById('modalBg').classList.remove('open');
});

// Init — tự động load từ URL đã lưu
renderStats(currentData);
render();

const savedUrl = localStorage.getItem(STORAGE_KEY);
if (savedUrl) {
  document.getElementById('apiUrl').value = savedUrl;
  document.querySelector('.setup-banner').style.display = 'none';
  // Tự động fetch data mới nhất từ Sheets
  fetchFromUrl(savedUrl, applyData, () => {
    // Nếu lỗi thì vẫn giữ data cũ trong HTML, không làm gì
    console.warn('Auto-fetch failed, using embedded data');
  });
}
