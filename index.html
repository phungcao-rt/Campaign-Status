<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partner Campaign Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --surface: #13151d; --surface2: #1a1d27;
  --border: #232736; --border2: #2d3245;
  --text: #e2e4ee; --muted: #5a6080; --muted2: #8891b0;
  --ongoing: #22c55e; --ongoing-dim: #14532d; --ongoing-bg: #071a0f;
  --stopped: #f97316; --stopped-dim: #7c2d12; --stopped-bg: #1c0900;
  --banned: #ef4444; --banned-dim: #7f1d1d; --banned-bg: #1c0000;
  --mixed: #eab308; --mixed-bg: #1a1200;
  --integrated: #3b82f6; --integrated-bg: #0a1628;
  --accent: #818cf8; --accent2: #38bdf8; --accent3: #a78bfa;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;font-size:13px;}

/* HEADER */
.header{
  padding:24px 28px 20px;
  background:linear-gradient(180deg,#12141e 0%,var(--bg) 100%);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
}
.title{font-size:22px;font-weight:800;letter-spacing:-.5px;}
.title em{color:var(--accent);font-style:normal;}
.subtitle{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}
.stats{display:flex;gap:20px;flex-wrap:wrap;}
.stat{text-align:center;}
.stat-val{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.updated{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:6px;}

/* CONTROLS */
.controls{
  position:sticky;top:0;z-index:100;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.search-wrap{position:relative;}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
input[type=search]{
  background:var(--bg);border:1px solid var(--border2);border-radius:7px;
  color:var(--text);padding:7px 11px 7px 30px;font-family:'DM Mono',monospace;
  font-size:12px;outline:none;width:200px;transition:border-color .15s;
}
input[type=search]:focus{border-color:var(--accent);}

.sep{width:1px;height:24px;background:var(--border2);margin:0 4px;}

.filter-group{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600;white-space:nowrap;}
.fbtn{
  padding:4px 12px;border-radius:20px;border:1px solid var(--border2);
  background:transparent;color:var(--muted2);font-family:'Syne',sans-serif;
  font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;
}
.fbtn:hover{border-color:var(--accent);color:var(--accent);}
.fbtn.active{color:#fff;border-color:transparent;}
.fbtn.fa-all.active{background:var(--accent);}
.fbtn.fa-active.active{background:var(--ongoing);}
.fbtn.fa-inactive.active{background:var(--muted);}
.fbtn.fa-banned.active{background:var(--banned);}
.fbtn.fc-1.active{background:#334155;}
.fbtn.fc-2.active{background:#1e3a5f;}
.fbtn.fc-6.active{background:#312e81;}
.fbtn.fc-10.active{background:#4c1d95;}

.view-toggle{margin-left:auto;display:flex;gap:4px;}
.vbtn{
  padding:5px 11px;border-radius:6px;border:1px solid var(--border2);
  background:transparent;color:var(--muted);cursor:pointer;font-size:12px;
  transition:all .15s;
}
.vbtn.active{background:var(--surface2);color:var(--text);border-color:var(--accent);}

/* MAIN */
main{padding:20px 28px;}
.result-count{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:12px;}

/* PIVOT TABLE */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);}
table{border-collapse:collapse;width:100%;}

/* HEADER ROW — campaign names horizontal, rotated just enough */
thead tr:first-child th{
  background:var(--surface2);
  border-bottom:1px solid var(--border);
  padding:0;
  white-space:nowrap;
}
thead tr:first-child th.sticky-col{
  position:sticky;left:0;z-index:12;background:var(--surface2);
  border-right:1px solid var(--border2);
}
.th-inner{
  display:flex;align-items:flex-end;justify-content:center;
  padding:10px 6px 10px;height:100px;
}
.th-inner span{
  display:block;
  transform:rotate(-45deg);
  transform-origin:bottom left;
  font-size:10px;font-weight:600;color:var(--muted2);
  font-family:'DM Mono',monospace;letter-spacing:.3px;
  white-space:nowrap;text-transform:uppercase;
}
.th-plain{
  padding:10px 14px;text-align:left;
  font-size:10px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.8px;
  font-family:'DM Mono',monospace;
}
.th-plain.center{text-align:center;}

/* DATA ROWS */
tbody tr{transition:background .1s;cursor:pointer;}
tbody tr:hover td{background:#181c2a !important;}
tbody tr:nth-child(even) td{background:#0f1118;}
tbody tr:nth-child(odd) td{background:var(--bg);}
td{
  padding:6px 8px;border-bottom:1px solid #13151d;
  white-space:nowrap;vertical-align:middle;
}
td.sticky-col{
  position:sticky;left:0;z-index:5;
  background:var(--surface) !important;
  border-right:1px solid var(--border);
  font-weight:600;font-size:12px;min-width:160px;max-width:200px;
  overflow:hidden;text-overflow:ellipsis;padding:6px 12px;
}
tbody tr:hover td.sticky-col{background:#1a1e2e !important;}
td.num{font-family:'DM Mono',monospace;text-align:center;font-size:11px;}
td.cam-cell{text-align:center;padding:4px 6px;}

/* DOT */
.dot{
  width:8px;height:8px;border-radius:50%;margin:auto;
  flex-shrink:0;
}
.dot.ongoing{background:var(--ongoing);box-shadow:0 0 5px var(--ongoing);}
.dot.stopped{background:var(--stopped);}
.dot.banned{background:var(--banned);box-shadow:0 0 5px var(--banned);}
.dot.mixed{background:var(--mixed);}
.dot.integrated{background:var(--integrated-bg);border:1.5px solid var(--integrated);}
.dot.empty{background:transparent;width:4px;height:4px;border:1px solid #2d3245;}

/* STATUS BADGE */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  border-radius:4px;padding:2px 7px;
  font-size:10px;font-weight:600;font-family:'DM Mono',monospace;
}
.b-active{background:var(--ongoing-bg);color:var(--ongoing);border:1px solid var(--ongoing-dim);}
.b-inactive{background:#1a1d27;color:var(--muted2);border:1px solid var(--border2);}
.b-banned{background:var(--banned-bg);color:var(--banned);border:1px solid var(--banned-dim);}
.b-mixed{background:var(--mixed-bg);color:var(--mixed);border:1px solid #713f12;}

/* CARD VIEW */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.card.active::before{background:var(--ongoing);}
.card.inactive::before{background:var(--muted);}
.card.banned::before{background:var(--banned);}
.card.mixed::before{background:var(--mixed);}
.card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.4);}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px;}
.card-name{font-size:13px;font-weight:700;line-height:1.3;flex:1;}
.card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:10px;}
.tag{
  font-size:9px;font-family:'DM Mono',monospace;padding:2px 6px;
  border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--muted2);
}
.card-nums{display:flex;gap:14px;}
.cn-val{font-size:16px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;}
.cn-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-top:2px;}

/* MODAL */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;
}
.modal-bg.open{display:flex;}
.modal{
  background:var(--surface);border:1px solid var(--border2);border-radius:14px;
  padding:24px;max-width:580px;width:92%;max-height:82vh;overflow-y:auto;position:relative;
}
.modal-x{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:4px;}
.modal-x:hover{background:var(--surface2);color:var(--text);}
.modal-title{font-size:18px;font-weight:800;margin-bottom:4px;}
.modal-meta{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:18px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.m-campaign{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:11px 14px;margin-bottom:8px;}
.m-cname{font-size:12px;font-weight:700;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px;}
.chip{padding:1px 8px;border-radius:3px;font-size:10px;font-weight:600;font-family:'DM Mono',monospace;}
.cg{background:var(--ongoing-bg);color:var(--ongoing);}
.co{background:var(--stopped-bg);color:var(--stopped);}
.cr{background:var(--banned-bg);color:var(--banned);}
.cb{background:var(--integrated-bg);color:var(--integrated);}
.cy{background:var(--mixed-bg);color:var(--mixed);}
.m-dates{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:5px;line-height:1.8;}

/* SETUP */
.setup{
  background:linear-gradient(135deg,#141028,#0d1a2a);
  border:1px solid #2a2040;border-radius:10px;
  padding:16px 20px;margin-bottom:18px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.setup h3{font-size:13px;font-weight:700;color:var(--accent3);margin-bottom:3px;}
.setup p{font-size:11px;color:var(--muted);line-height:1.7;}
.api-input{
  background:var(--bg);border:1px solid var(--border2);border-radius:6px;
  color:var(--text);padding:5px 10px;font-family:'DM Mono',monospace;font-size:11px;
  width:340px;max-width:100%;outline:none;transition:border-color .15s;
}
.api-input:focus{border-color:var(--accent);}
.load-btn{
  background:var(--accent);border:none;border-radius:6px;color:#fff;
  padding:5px 14px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:opacity .15s;white-space:nowrap;
}
.load-btn:hover{opacity:.85;}
.load-btn:disabled{opacity:.5;cursor:not-allowed;}
.empty{text-align:center;padding:60px;color:var(--muted);}

@media(max-width:640px){
  .header,.controls,main{padding-left:14px;padding-right:14px;}
  .api-input{width:100%;}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="title">Partner <em>Campaign</em> Dashboard</div>
    <div class="subtitle">SP Team · 2025</div>
  </div>
  <div>
    <div class="stats" id="stats"></div>
    <div class="updated" id="updated"></div>
  </div>
</div>

<div class="controls">
  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="searchInput" placeholder="Tìm partner...">
  </div>
  <div class="sep"></div>
  <div class="filter-group">
    <span class="filter-label">Status:</span>
    <button class="fbtn fa-all active" data-ftype="status" data-fval="all">Tất cả</button>
    <button class="fbtn fa-active"   data-ftype="status" data-fval="active">🟢 Active</button>
    <button class="fbtn fa-inactive" data-ftype="status" data-fval="inactive">⚪ Inactive</button>
    <button class="fbtn fa-banned"   data-ftype="status" data-fval="banned">🔴 Banned</button>
  </div>
  <div class="sep"></div>
  <div class="filter-group">
    <span class="filter-label">Campaigns:</span>
    <button class="fbtn fc-1 active" data-ftype="camp" data-fval="all">Tất cả</button>
    <button class="fbtn fc-1" data-ftype="camp" data-fval="1">1</button>
    <button class="fbtn fc-2" data-ftype="camp" data-fval="2-5">2–5</button>
    <button class="fbtn fc-6" data-ftype="camp" data-fval="6-9">6–9</button>
    <button class="fbtn fc-10" data-ftype="camp" data-fval="10+">10+</button>
  </div>
  <div class="view-toggle">
    <button class="vbtn active" id="btnTable" onclick="setView('table')">⊞ Pivot</button>
    <button class="vbtn" id="btnCard" onclick="setView('card')">▦ Cards</button>
    <button class="vbtn" id="btnExport" onclick="exportExcel()" style="color:var(--ongoing);border-color:var(--ongoing-dim);">⬇ Excel</button>
  </div>
</div>

<main>
  <div class="setup" id="setupBanner">
    <div style="font-size:24px">🔗</div>
    <div style="flex:1">
      <h3>Kết nối Google Sheets để tự động cập nhật</h3>
      <p>
        Dán Apps Script Web App URL:
        <input class="api-input" id="apiUrl" placeholder="https://script.google.com/macros/s/XXXXX/exec">
        <button class="load-btn" id="loadBtn" onclick="loadFromApi()">Load</button>
      </p>
    </div>
  </div>

  <div class="result-count" id="resultCount"></div>
  <div id="tableView" class="tbl-wrap"></div>
  <div id="cardView" class="card-grid" style="display:none"></div>
</main>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-x" onclick="closeModal()">✕</button>
    <div class="modal-title" id="mTitle"></div>
    <div class="modal-meta"  id="mMeta"></div>
    <div id="mBody"></div>
  </div>
</div>

let currentData = RAW;

let searchQ      = '';

// ── HELPERS ──────────────────────────────────────────────────────
function pubStatus(p) {
  if (p.banned > 0 && p.ongoing === 0) return 'banned';
  if (p.ongoing > 0) return 'active';
  return 'inactive';
}

function badgeHtml(s) {
  const map = {active:'b-active',inactive:'b-inactive',banned:'b-banned',mixed:'b-mixed'};
  const lbl = {active:'Active',inactive:'Inactive',banned:'Banned',mixed:'Mixed'};
  const cls = map[s] || 'b-inactive';
  return `<span class="badge ${cls}">${lbl[s]||s}</span>`;
}

function dotHtml(camStatus) {
  if (!camStatus) return `<div class="dot empty"></div>`;
  const s = (camStatus||'').toLowerCase();
  const cls = s==='ongoing'?'ongoing':s==='stopped'?'stopped':s==='banned'?'banned':s==='mixed'?'mixed':'integrated';
  return `<div class="dot ${cls}"></div>`;
}

function shortName(c) {
  return c.replace(/ \(Adjust\)| \(Airbridge\)| \(AF\)| \(CPI\)/g,'').trim();
}

// ── FILTER ───────────────────────────────────────────────────────
function getFiltered() {
  return currentData.partners.filter(p => {
    const ps = pubStatus(p);
    const nc = p.numCampaigns;
    const q  = searchQ.toLowerCase();

    const okSearch = !q || p.partner.toLowerCase().includes(q);
    const okStatus = filterStatus==='all' || ps===filterStatus;
    const okCamp   = filterCamp==='all' ||
      (filterCamp==='1'   && nc===1) ||
      (filterCamp==='2-5' && nc>=2 && nc<=5) ||
      (filterCamp==='6-9' && nc>=6 && nc<=9) ||
      (filterCamp==='10+' && nc>=10);

    return okSearch && okStatus && okCamp;
  });
}

// ── STATS ────────────────────────────────────────────────────────
function renderStats(data) {
  const ps = data.partners;
  const active   = ps.filter(p=>pubStatus(p)==='active').length;
  const inactive = ps.filter(p=>pubStatus(p)==='inactive').length;
  const banned   = ps.filter(p=>pubStatus(p)==='banned').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-val">${ps.length}</div><div class="stat-lbl">Partners</div></div>
    <div class="stat"><div class="stat-val">${data.campaigns.length}</div><div class="stat-lbl">Campaigns</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--ongoing)">${active}</div><div class="stat-lbl">Active</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--muted2)">${inactive}</div><div class="stat-lbl">Inactive</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--banned)">${banned}</div><div class="stat-lbl">Banned</div></div>
  `;
  const d = new Date(data.lastUpdated);
  document.getElementById('updated').textContent = 'Updated: ' + d.toLocaleString('vi-VN');
}

// ── TABLE ────────────────────────────────────────────────────────
function renderTable(partners) {
  const campaigns = currentData.campaigns;
  let html = `<table><thead><tr>
    <th class="sticky-col"><div class="th-plain">Partner</div></th>
    <th><div class="th-plain center"># Camp</div></th>
    <th><div class="th-plain center">PIDs</div></th>
    ${campaigns.map(c=>`<th><div class="th-inner"><span>${shortName(c)}</span></div></th>`).join('')}
    <th><div class="th-plain center">Status</div></th>
  </tr></thead><tbody>`;

  for (const p of partners) {
    const cmap = {};
    for (const c of p.campaigns) cmap[c.name] = c.status;
    const ps = pubStatus(p);
    const nc = p.numCampaigns;
    const ncColor = nc>=10?'color:var(--accent3);font-weight:700':nc>=6?'color:var(--accent)':nc>=2?'color:var(--accent2)':'color:var(--muted2)';
    html += `<tr onclick="openModal('${p.partner.replace(/'/g,"\'")}')" >
      <td class="sticky-col" title="${p.partner}">${p.partner}</td>
      <td class="num" style="${ncColor}">${nc}</td>
      <td class="num">${p.totalPIDs}</td>
      ${campaigns.map(c=>`<td class="cam-cell">${dotHtml(cmap[c])}</td>`).join('')}
      <td style="text-align:center">${badgeHtml(ps)}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('tableView').innerHTML = html;
}

// ── CARDS ─────────────────────────────────────────────────────────
function renderCards(partners) {
  if (!partners.length) {
    document.getElementById('cardView').innerHTML = '<div class="empty">Không tìm thấy kết quả</div>';
    return;
  }
  const html = partners.map(p => {
    const ps = pubStatus(p);
    const tags = p.campaigns.map(c=>`<span class="tag">${shortName(c.name)}</span>`).join('');
    const colors = {active:'var(--ongoing)',inactive:'var(--muted)',banned:'var(--banned)'};
    return `<div class="card ${ps}" onclick="openModal('${p.partner.replace(/'/g,"\'")}')" >
      <div class="card-head">
        <div class="card-name">${p.partner}</div>
        ${badgeHtml(ps)}
      </div>
      <div class="card-tags">${tags}</div>
      <div class="card-nums">
        <div class="card-num"><div class="cn-val" style="color:var(--accent)">${p.numCampaigns}</div><div class="cn-lbl">Campaigns</div></div>
        <div class="card-num"><div class="cn-val">${p.totalPIDs}</div><div class="cn-lbl">PIDs</div></div>
        <div class="card-num"><div class="cn-val" style="color:var(--ongoing)">${p.ongoing}</div><div class="cn-lbl">Ongoing</div></div>
        ${p.stopped?`<div class="card-num"><div class="cn-val" style="color:var(--stopped)">${p.stopped}</div><div class="cn-lbl">Stopped</div></div>`:''}
        ${p.banned ?`<div class="card-num"><div class="cn-val" style="color:var(--banned)">${p.banned}</div><div class="cn-lbl">Banned</div></div>`:''}
      </div>
    </div>`;
  }).join('');
  document.getElementById('cardView').innerHTML = html;
}

// ── MODAL ─────────────────────────────────────────────────────────
function openModal(name) {
  const p = currentData.partners.find(x=>x.partner===name);
  if (!p) return;
  const ps = pubStatus(p);
  document.getElementById('mTitle').textContent = p.partner;
  document.getElementById('mMeta').innerHTML =
    `${badgeHtml(ps)} <span>${p.numCampaigns} campaigns</span> · <span>${p.totalPIDs} PIDs</span>`;
  const body = p.campaigns.map(c => {
    const cs = (c.status||'').toLowerCase();
    const dates = [
      c.pubShareDates    ? `📅 Pub share: ${c.pubShareDates}`       : '',
      c.integrationDates ? `✅ Integration: ${c.integrationDates}`  : '',
      c.pauseDates       ? `⏸ Pause: ${c.pauseDates}`               : '',
    ].filter(Boolean).join('<br>');
    return `<div class="m-campaign">
      <div class="m-cname"><span>${c.name}</span><span class="badge b-${cs==='ongoing'?'active':cs==='banned'?'banned':'inactive'}">${c.status||'—'}</span></div>
      <div class="chips">
        ${c.ongoing     ?`<span class="chip cg">Ongoing ${c.ongoing}</span>`    :''}
        ${c.stopped     ?`<span class="chip co">Stopped ${c.stopped}</span>`    :''}
        ${c.banned      ?`<span class="chip cr">Banned ${c.banned}</span>`      :''}
        ${c.launched    ?`<span class="chip cb">Launched ${c.launched}</span>`  :''}
        ${c.integrating ?`<span class="chip cy">Integrating ${c.integrating}</span>`:''}
      </div>
      ${dates?`<div class="m-dates">${dates}</div>`:''}
    </div>`;
  }).join('');
  document.getElementById('mBody').innerHTML = body;
  document.getElementById('modalBg').classList.add('open');
}
function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  const f = getFiltered();
  document.getElementById('resultCount').textContent = `${f.length} / ${currentData.partners.length} partners`;
  if (currentView==='table') renderTable(f);
  else renderCards(f);
}

function setView(v) {
  currentView = v;
  document.getElementById('tableView').style.display = v==='table'?'':'none';
  document.getElementById('cardView').style.display  = v==='card' ?'':'none';
  document.getElementById('btnTable').classList.toggle('active',v==='table');
  document.getElementById('btnCard').classList.toggle('active', v==='card');
  render();
}

// ── API LOAD ──────────────────────────────────────────────────────
function fetchFromUrl(url, onOk, onErr) {
  const cb = 'gscb_' + Date.now();
  const el = document.createElement('script');
  const t  = setTimeout(()=>{ cleanup(); onErr&&onErr('Timeout'); }, 15000);
  function cleanup(){ clearTimeout(t); delete window[cb]; el.parentNode&&el.parentNode.removeChild(el); }
  window[cb] = d => { cleanup(); onOk(d); };
  el.onerror = ()=>{ cleanup(); fetch(url).then(r=>r.json()).then(onOk).catch(e=>onErr&&onErr(e.message)); };
  el.src = url + (url.includes('?')?'&':'?') + 'callback=' + cb;
  document.head.appendChild(el);
}

function applyData(data) {
  currentData = data;
  renderStats(data);
  render();
  document.getElementById('setupBanner').style.display = 'none';
}

function loadFromApi() {
  const url = document.getElementById('apiUrl').value.trim();
  if (!url) return alert('Vui lòng nhập URL Apps Script');
  localStorage.setItem(STORAGE_KEY, url);
  const btn = document.getElementById('loadBtn');
  btn.textContent = 'Loading...'; btn.disabled = true;
  fetchFromUrl(url,
    d=>{ applyData(d); btn.textContent='Load'; btn.disabled=false; },
    e=>{ btn.textContent='Load'; btn.disabled=false; alert('Lỗi: '+e); }
  );
}

    // Column widths
    ws1['!cols'] = [
      {wch:24},{wch:10},{wch:12},{wch:12},{wch:10},{wch:10},{wch:10},
      ...campaigns.map(()=>({wch:14}))
    ];
    XLSX.utils.book_append_sheet(wb, ws1, 'Partner Overview');

    // ── Sheet 2: Detail per campaign ──
    const detail_header = ['Partner','Campaign','Status (Partner)','Status (Campaign)','Total PIDs','Ongoing','Stopped','Banned','Launched','Integrated','Integrating','Pub Share Dates','Integration Dates','Pause Dates'];
    const detail_rows = [];
    for (const p of filtered) {
      const ps = pubStatus(p);
      for (const c of p.campaigns) {
        detail_rows.push([
          p.partner,
          c.name,
          ps==='active'?'Active':ps==='banned'?'Banned':'Inactive',
          c.status||'',
          c.totalPIDs, c.ongoing, c.stopped, c.banned,
          c.launched, c.integrated, c.integrating,
          c.pubShareDates||'', c.integrationDates||'', c.pauseDates||''
        ]);
      }
    }
    const ws2 = XLSX.utils.aoa_to_sheet([detail_header, ...detail_rows]);
    ws2['!cols'] = [{wch:24},{wch:28},{wch:14},{wch:16},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:12},{wch:13},{wch:22},{wch:22},{wch:18}];
    XLSX.utils.book_append_sheet(wb, ws2, 'Campaign Detail');

    // Download
    const now = new Date();
    const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
    XLSX.writeFile(wb, `Partner_Dashboard_${ts}.xlsx`);
    btn.textContent = '⬇ Excel'; btn.disabled = false;
  }

  if (window.XLSX) {
    doExport();
  } else {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = doExport;
    s.onerror = () => { alert('Không load được thư viện Excel. Kiểm tra kết nối mạng.'); btn.textContent='⬇ Excel'; btn.disabled=false; };
    document.head.appendChild(s);
  }
}

// ── INIT ──────────────────────────────────────────────────────────
renderStats(currentData);
render();

const saved = localStorage.getItem(STORAGE_KEY);
if (saved) {
  document.getElementById('apiUrl').value = saved;
  document.getElementById('setupBanner').style.display = 'none';
  fetchFromUrl(saved, applyData, ()=>console.warn('Auto-fetch failed, using embedded data'));
}
</script>
</body>
</html>
